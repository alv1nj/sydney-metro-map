<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>悉尼 Metro 线路图</title>
<style>
  :root {
    --red:#d7153a; --red-dark:#8f0c24;
    --teal:#168388; --teal-dark:#0e5a5e;
    --west:#7d3fe0; --air:#ee6b22;
    --ink:#1d1d1f; --ink2:#6e6e73; --ink3:#aeaeb2;
    --paper:#f7f6f2;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; }
  #app { display:flex; flex-direction:column; height:100%; height:100dvh; }

  /* ── 顶栏 ── */
  header {
    background:linear-gradient(135deg,var(--red-dark) 0%,var(--red) 62%,#ee3a5d 100%);
    color:#fff; padding:12px 16px calc(12px);
    padding-top:calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; gap:12px; z-index:30;
    box-shadow:0 1px 0 rgba(255,255,255,.15) inset, 0 4px 18px rgba(143,12,36,.35);
  }
  .roundel {
    width:38px; height:38px; border-radius:50%; flex:none;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .roundel svg { width:26px; height:26px; display:block; }
  header .titles { flex:1; min-width:0; }
  header h1 { font-size:17px; font-weight:700; letter-spacing:.3px; }
  header .sub { font-size:11px; opacity:.75; margin-top:1px; font-weight:500; letter-spacing:.2px; }
  #legendBtn {
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.35);
    color:#fff; border-radius:18px; padding:6px 14px; font-size:13px; font-weight:600;
    backdrop-filter:blur(8px);
  }

  #mapWrap { flex:1; position:relative; overflow:hidden; touch-action:none;
    background:
      radial-gradient(1200px 800px at 75% 30%, #ffffff 0%, transparent 60%),
      var(--paper); }
  svg { width:100%; height:100%; display:block; cursor:grab; }

  /* ── 玻璃面板通用 ── */
  .glass {
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(16px) saturate(1.5);
    -webkit-backdrop-filter:blur(16px) saturate(1.5);
    border:1px solid rgba(0,0,0,.06);
    box-shadow:0 8px 28px rgba(20,40,50,.14), 0 1px 0 rgba(255,255,255,.9) inset;
  }

  /* ── 图例 ── */
  #legend {
    position:absolute; top:12px; left:12px; z-index:20;
    border-radius:16px; padding:13px 15px;
    font-size:12.5px; line-height:2.05; max-width:238px; display:none;
  }
  #legend.show { display:block; }
  #legend .row { display:flex; align-items:center; gap:10px; font-weight:500; }
  #legend .sw { width:28px; height:6px; border-radius:3px; flex:none; }
  #legend .swd { width:28px; height:0; border-top:5px dashed; border-radius:3px; flex:none; }
  #legend .zoneSw { width:28px; height:15px; border-radius:4px; flex:none;
    background:rgba(22,131,136,.10); border:1.5px dashed #9aa0a6; }
  #legend .yr { margin-left:auto; font-size:10px; font-weight:700; color:#fff;
    border-radius:8px; padding:1px 7px; }
  #legend .note { font-size:10.5px; color:var(--ink2); line-height:1.55; margin-top:8px;
    border-top:1px solid rgba(0,0,0,.08); padding-top:8px; font-weight:400; }

  /* ── 缩放控件 ── */
  #zoomCtrl {
    position:absolute; right:12px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:20;
    border-radius:22px; overflow:hidden; display:flex; flex-direction:column;
  }
  #zoomCtrl button {
    width:44px; height:44px; border:none; background:transparent;
    font-size:19px; color:var(--teal-dark); font-weight:600;
  }
  #zoomCtrl button:not(:last-child){ border-bottom:1px solid rgba(0,0,0,.07); }
  #zoomCtrl button:active { background:rgba(22,131,136,.12); }

  /* ── 底部详情卡 ── */
  #sheet {
    position:absolute; left:10px; right:10px;
    bottom:calc(10px + env(safe-area-inset-bottom)); z-index:40;
    border-radius:22px; padding:16px 18px 18px;
    transform:translateY(calc(100% + 40px));
    transition:transform .45s cubic-bezier(.32,.72,.24,1);
    max-height:64%; overflow-y:auto;
  }
  #sheet.show { transform:translateY(0); }
  #sheet .accent { position:absolute; left:0; top:0; bottom:0; width:5px;
    border-radius:22px 0 0 22px; }
  #sheet .handle { width:36px; height:4.5px; background:rgba(0,0,0,.15);
    border-radius:3px; margin:0 auto 12px; }
  #sheet h2 { font-size:21px; font-weight:800; letter-spacing:.2px; }
  #sheet .en { font-size:13px; color:var(--ink2); margin:2px 0 10px; font-weight:500; }
  #sheet .badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .badge { font-size:11px; font-weight:600; padding:4px 11px; border-radius:20px; color:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .badge.outline { background:#fff !important; box-shadow:none; }

  .cbdCard { display:flex; align-items:center; gap:12px;
    background:rgba(22,131,136,.08); border:1px solid rgba(22,131,136,.18);
    border-radius:14px; padding:11px 14px; margin-bottom:10px; }
  .cbdCard .icon { font-size:20px; }
  .cbdCard .k { font-size:10.5px; color:var(--ink2); font-weight:600; letter-spacing:.3px; }
  .cbdCard .v { font-size:16px; font-weight:800; margin-top:1px; }
  .cbdCard .v small { font-size:11px; font-weight:500; color:var(--ink2); }

  .dirWrap { display:flex; flex-direction:column; gap:8px; }
  .dirCard { border-radius:14px; padding:10px 14px 11px;
    background:rgba(0,0,0,.035); border:1px solid rgba(0,0,0,.06); }
  .dirCard .dirName { font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .dirCard .arrow { display:inline-flex; width:18px; height:18px; border-radius:50%;
    color:#fff; align-items:center; justify-content:center; font-size:11px; flex:none; }
  .dirCard .times { display:flex; gap:0; margin-top:7px; }
  .dirCard .tcol { flex:1; }
  .dirCard .tcol:first-child { border-right:1px solid rgba(0,0,0,.08); }
  .dirCard .tcol:last-child { padding-left:14px; }
  .dirCard .tk { font-size:10px; color:var(--ink2); font-weight:600; }
  .dirCard .tv { font-size:19px; font-weight:800; font-variant-numeric:tabular-nums;
    margin-top:1px; letter-spacing:.3px; }
  .dirCard .tv small { font-size:10.5px; color:var(--ink3); font-weight:600; margin-left:2px; }

  .naCard { border-radius:14px; padding:13px 15px; background:rgba(0,0,0,.035);
    border:1px dashed rgba(0,0,0,.15); font-size:13px; color:var(--ink2);
    font-weight:500; line-height:1.55; }
  .naCard b { color:var(--ink); }

  /* ── 区域画像 ── */
  .lgaCard { border-radius:14px; padding:11px 14px 8px; background:rgba(0,0,0,.035);
    border:1px solid rgba(0,0,0,.06); margin-bottom:10px; }
  .lgaCard .lh { font-size:11px; font-weight:800; color:var(--ink2);
    letter-spacing:.4px; margin-bottom:6px; }
  .lgaRow { display:flex; gap:8px; padding:5.5px 0; font-size:12px; align-items:baseline; }
  .lgaRow + .lgaRow { border-top:1px dashed rgba(0,0,0,.07); }
  .lgaRow .ic { flex:none; width:18px; text-align:center; }
  .lgaRow .k { flex:none; width:78px; color:var(--ink2); font-weight:600; font-size:11px; }
  .lgaRow .v { flex:1; font-weight:600; line-height:1.5; }
  .lgaRow .v small { color:var(--ink2); font-weight:500; }
  .safeBadge { font-size:10.5px; font-weight:800; color:#fff; border-radius:8px;
    padding:1.5px 8px; margin-right:6px; white-space:nowrap; }

  #sheet .foot { font-size:10px; color:var(--ink3); margin-top:11px; line-height:1.5; }
  #closeSheet { position:absolute; right:14px; top:14px; border:none;
    background:rgba(0,0,0,.06); width:29px; height:29px; border-radius:50%;
    font-size:13px; color:var(--ink2); font-weight:700; }

  .stn { cursor:pointer; }
  .zoneLabel { font-weight:800; pointer-events:none; letter-spacing:1.2px;
    text-transform:uppercase; }

  /* ── 行程规划 ── */
  .dim { opacity:.18; transition:opacity .4s; }
  #routePill {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:22; border-radius:20px; padding:8px 8px 8px 16px;
    display:none; align-items:center; gap:10px; font-size:13px; font-weight:700;
    white-space:nowrap; max-width:92%;
  }
  #routePill.show { display:flex; }
  #routePill .rp-time { color:var(--teal-dark); }
  #routePill button { border:none; background:rgba(0,0,0,.08); color:var(--ink2);
    width:26px; height:26px; border-radius:50%; font-size:12px; font-weight:700; flex:none; }
  .hintBar { display:flex; align-items:center; gap:8px; margin-top:12px;
    background:rgba(52,199,89,.12); border:1px solid rgba(52,199,89,.35);
    border-radius:12px; padding:10px 13px; font-size:12.5px; font-weight:600; color:#1d7a3c; }
  .jHead { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .jHead .stop { flex:1; min-width:0; }
  .jHead .stop .n { font-size:15.5px; font-weight:800; }
  .jHead .stop .e { font-size:10.5px; color:var(--ink2); }
  .jHead .stop.to { text-align:right; }
  .jArrow { flex:none; color:var(--ink3); font-size:16px; font-weight:700; }
  .jTotal { display:flex; align-items:baseline; gap:8px;
    background:rgba(22,131,136,.08); border:1px solid rgba(22,131,136,.18);
    border-radius:14px; padding:12px 15px; margin-bottom:10px; }
  .jTotal .num { font-size:29px; font-weight:800; color:var(--teal-dark);
    font-variant-numeric:tabular-nums; }
  .jTotal .unit { font-size:13px; font-weight:600; color:var(--ink2); }
  .jTotal .est { margin-left:auto; font-size:10.5px; font-weight:700; color:#b25b00;
    background:rgba(238,107,34,.13); border-radius:9px; padding:3px 9px; }
  .segRow { display:flex; align-items:center; gap:11px; padding:8px 2px; }
  .segRow + .segRow { border-top:1px dashed rgba(0,0,0,.08); }
  .segRow .chip { width:9px; height:32px; border-radius:5px; flex:none; }
  .segRow .chip.walk { background:repeating-linear-gradient(0deg,#b6b6bb 0 4px,transparent 4px 8px); }
  .segRow .info { flex:1; min-width:0; }
  .segRow .ln { font-size:12px; font-weight:700; }
  .segRow .ft { font-size:11px; color:var(--ink2); margin-top:1px; }
  .segRow .mins { font-size:14px; font-weight:800; color:var(--ink);
    font-variant-numeric:tabular-nums; flex:none; }
  #clearRoute { width:100%; margin-top:12px; border:none; border-radius:13px;
    padding:12px; font-size:14px; font-weight:700; color:#c0392b;
    background:rgba(255,59,48,.1); }
</style>

// 折线 → 圆角平滑路径
function roundedPath(pts, r, close){
  const n=pts.length, seg=(a,b)=>Math.hypot(b[0]-a[0],b[1]-a[1]);
  const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
  let d="";
  if(close){
    for(let i=0;i<n;i++){
      const p=pts[i], prev=pts[(i-1+n)%n], next=pts[(i+1)%n];
      const r1=Math.min(r, seg(prev,p)/2), r2=Math.min(r, seg(p,next)/2);
      const a=lerp(p,prev,r1/seg(prev,p)), b=lerp(p,next,r2/seg(p,next));
      d += (i?`L${a[0]},${a[1]} `:`M${a[0]},${a[1]} `) + `Q${p[0]},${p[1]} ${b[0]},${b[1]} `;
    }
    return d+"Z";
  }
  d=`M${pts[0][0]},${pts[0][1]} `;
  for(let i=1;i<n-1;i++){
    const p=pts[i], prev=pts[i-1], next=pts[i+1];
    const r1=Math.min(r, seg(prev,p)/2), r2=Math.min(r, seg(p,next)/2);
    const a=lerp(p,prev,r1/seg(prev,p)), b=lerp(p,next,r2/seg(p,next));
    d += `L${a[0]},${a[1]} Q${p[0]},${p[1]} ${b[0]},${b[1]} `;
  }
  return d+`L${pts[n-1][0]},${pts[n-1][1]}`;
}

// ════════ 行程规划 ════════
// 建图：相邻站权重 = 至市中心时间差（分钟），另加换乘接驳边
const ADJ={};
function addEdge(a,b,t,line){
  (ADJ[a]=ADJ[a]||[]).push({to:b,t,line});
  (ADJ[b]=ADJ[b]||[]).push({to:a,t,line});
}
for(const key in ROUTES){
  const ids=ROUTES[key];
  for(let i=0;i<ids.length-1;i++)
    addEdge(ids[i],ids[i+1],Math.max(1,Math.abs($id(ids[i]).t-$id(ids[i+1]).t)),key);
}
for(const c of CONNECTORS) addEdge(c.a,c.b,c.t,c.kind);

function findRoute(from,to){ // Dijkstra
  const dist={},prev={},prevE={},Q=new Set(Object.keys(ADJ));
  Q.forEach(id=>dist[id]=Infinity); dist[from]=0;
  while(Q.size){
    let u=null; for(const id of Q) if(u===null||dist[id]<dist[u]) u=id;
    if(dist[u]===Infinity) break;
    Q.delete(u); if(u===to) break;
    for(const e of ADJ[u]) if(Q.has(e.to)&&dist[u]+e.t<dist[e.to]){
      dist[e.to]=dist[u]+e.t; prev[e.to]=u; prevE[e.to]=e; }
  }
  if(dist[to]===Infinity) return null;
  const nodes=[to],edges=[]; let cur=to;
  while(cur!==from){ edges.unshift(prevE[cur]); cur=prev[cur]; nodes.unshift(cur); }
  return {from,to,nodes,edges,total:dist[to]};
}

let origin=null, activeRoute=null;
const baseGroups=[gZones,gLines,gConn,gStns];

function marker(s,color,label){
  const g=el("g",{},gMarkers);
  const c=el("circle",{cx:s.x,cy:s.y,r:9,fill:"none",stroke:color,"stroke-width":"2.5"},g);
  const a=el("animate",{attributeName:"r",values:"9;14;9",dur:"1.8s",repeatCount:"indefinite"},c);
  el("animate",{attributeName:"stroke-opacity",values:"1;0.2;1",dur:"1.8s",repeatCount:"indefinite"},c);
  el("circle",{cx:s.x,cy:s.y,r:6,fill:color,stroke:"#fff","stroke-width":"2"},g);
  el("rect",{x:s.x-11,y:s.y-30,width:22,height:17,rx:8.5,fill:color,filter:"url(#softShadow)"},g);
  const t=el("text",{x:s.x,y:s.y-17.5,"text-anchor":"middle","font-size":"10.5",
    fill:"#fff","font-weight":"800"},g);
  t.textContent=label;
}
function clearPlan(){
  origin=null; activeRoute=null;
  gMarkers.innerHTML=""; gRoute.innerHTML="";
  baseGroups.forEach(g=>g.classList.remove("dim"));
  document.getElementById("routePill").classList.remove("show");
}
function drawJourney(r){
  const pts=r.nodes.map(id=>{const s=$id(id);return [s.x,s.y];});
  const d=roundedPath(pts,16,false);
  baseGroups.forEach(g=>g.classList.add("dim"));
  el("path",{d,fill:"none",stroke:"#fff","stroke-width":"15",
    "stroke-linecap":"round","stroke-linejoin":"round",opacity:"0.9"},gRoute);
  el("path",{d,fill:"none",stroke:"#ff9f0a","stroke-width":"8.5",
    "stroke-linecap":"round","stroke-linejoin":"round",filter:"url(#softShadow)"},gRoute);
  for(const id of r.nodes){ const s=$id(id);
    el("circle",{cx:s.x,cy:s.y,r:4,fill:"#fff",stroke:"#ff9f0a","stroke-width":"2"},gRoute); }
  marker($id(r.from),"#34c759","起");
  marker($id(r.to),"#ff3b30","终");
}
function onTap(s){
  if(dragMoved) return;                          // 拖动后松手不算点按
  if(activeRoute){ clearPlan(); }               // 路线中再点站 → 重新开始
  if(!origin){                                   // 第一次点按：设为出发站
    origin=s.id; marker(s,"#34c759","起"); showSheet(s,true); return;
  }
  if(origin===s.id){ clearPlan(); sheet.classList.remove("show"); return; } // 再点出发站取消
  const r=findRoute(origin,s.id);
  if(!r){ clearPlan(); origin=s.id; marker(s,"#34c759","起"); showSheet(s,true); return; }
  activeRoute=r; gMarkers.innerHTML="";
  drawJourney(r); showJourney(r);
}

function showJourney(r){
  const A=$id(r.from), B=$id(r.to);
  const FUT={m1sw:1,air:1,west:1,t1:1};
  const est=r.edges.some(e=>FUT[e.line]);
  // 分段（m1sw 并入 M1 显示）
  const segs=[]; let cur=null;
  let idx=0;
  for(const e of r.edges){
    const key=e.line==="m1sw"?"m1":e.line;
    const isConn=key==="walk"||key==="t1";
    if(!cur||cur.key!==key||isConn){
      cur={key,t:0,from:r.nodes[idx],stops:0,conn:isConn}; segs.push(cur);
    }
    cur.t+=e.t; cur.stops++; cur.to=r.nodes[idx+1]; idx++;
  }
  document.getElementById("sAccent").style.background="#ff9f0a";
  document.getElementById("sName").textContent="行程规划";
  document.getElementById("sEn").textContent="Journey Planner";
  const badges=document.getElementById("sBadges"); badges.innerHTML="";
  badges.appendChild(badge("🧭 最短乘车路径","#ff9f0a"));
  if(est) badges.appendChild(badge("含未通车/接驳路段 · 预估","#8e8e93"));
  const segHtml=segs.map(g=>{
    const F=$id(g.from), T=$id(g.to);
    if(g.conn){
      const name=g.key==="t1"?"T1 城铁接驳":"步行换乘";
      return `<div class="segRow"><div class="chip walk"></div><div class="info">
        <div class="ln">${name}</div><div class="ft">${F.name} → ${T.name}</div></div>
        <div class="mins">${g.t} 分</div></div>`;
    }
    const L=LINES[g.key];
    return `<div class="segRow"><div class="chip" style="background:${L.color}"></div>
      <div class="info"><div class="ln" style="color:${L.color}">${L.name}</div>
      <div class="ft">${F.name} → ${T.name} · ${g.stops} 站</div></div>
      <div class="mins">${g.t} 分</div></div>`;
  }).join("");
  document.getElementById("sBody").innerHTML=`
    <div class="jHead">
      <div class="stop"><div class="n">${A.name}</div><div class="e">${A.en}</div></div>
      <div class="jArrow">⟶</div>
      <div class="stop to"><div class="n">${B.name}</div><div class="e">${B.en}</div></div>
    </div>
    <div class="jTotal"><span class="num">${r.total}</span><span class="unit">分钟（约）</span>
      ${est?'<span class="est">⚠ 预估</span>':''}</div>
    <div>${segHtml}</div>
    <button id="clearRoute">✕ 清除路线</button>`;
  document.getElementById("sFoot").textContent =
    (est?"路线含未通车线路或接驳段，时间为预估；":"")+"不含候车时间，实际以 TfNSW / TripView 为准。";
  document.getElementById("clearRoute").onclick=()=>{clearPlan();sheet.classList.remove("show");};
  // 顶部胶囊
  document.getElementById("rpText").textContent=`${A.name} ⟶ ${B.name}`;
  document.getElementById("rpTime").textContent=`约 ${r.total} 分钟`;
  document.getElementById("routePill").classList.add("show");
  sheet.classList.add("show");
}
document.getElementById("rpClear").onclick=()=>{clearPlan();sheet.classList.remove("show");};
document.getElementById("routePill").onclick=e=>{
  if(e.target.id!=="rpClear") sheet.classList.add("show"); };

// ════════ 详情卡 ════════
const sheet=document.getElementById("sheet");
function badge(text,color,outline){
  const b=document.createElement("span"); b.className="badge"+(outline?" outline":"");
  b.style.background=color; if(outline){b.style.color=color;b.style.border="1.5px solid "+color;}
  b.textContent=text; return b;
}
function showSheet(s, asOrigin){
  const L=LINES[s.line], Z=ZONES[s.zone];
  document.getElementById("sAccent").style.background=L.color;
  document.getElementById("sName").textContent=s.name;
  document.getElementById("sEn").textContent=`${s.en} · ${ZONES[s.zone].name} · NSW ${s.pc}`;
  const badges=document.getElementById("sBadges"); badges.innerHTML="";
  badges.appendChild(badge(L.name,L.color));
  badges.appendChild(badge(Z.name,Z.color,true));
  badges.appendChild(badge(L.open?"已通车":"未通车 · "+L.year+" 年",L.open?"#2e7d32":"#8e8e93"));

  const tView = s.t===0 ? "位于市中心"
    : `约 ${s.t} 分钟` + (s.tNote?` <small>（${s.tNote}）</small>`:"");
  let html=`<div class="cbdCard"><div class="icon">🏙</div><div>
      <div class="k">乘车至市中心 · CENTRAL / CBD</div>
      <div class="v">${tView}</div></div></div>`;
  html+=lgaCardHtml(s);

  if(s.line==="m1"){
    html+=`<div class="dirWrap">`+m1Times(s.id).map(d=>`
      <div class="dirCard">
        <div class="dirName"><span class="arrow" style="background:${L.color}">${d.icon}</span>
          往 ${d.dir}<span style="font-weight:500;color:var(--ink3);font-size:10.5px;margin-left:2px">${d.sub}</span></div>
        <div class="times">
          <div class="tcol"><div class="tk">🌅 首班车（约）</div><div class="tv">${d.first}</div></div>
          <div class="tcol"><div class="tk">🌙 末班车（约）</div><div class="tv">${d.last}${d.last<"04"? "<small>次日</small>":""}</div></div>
        </div>
      </div>`).join("")+`</div>`;
  } else {
    html+=`<div class="naCard">🚧 <b>尚未运营</b> — ${L.note||("预计 "+L.year+" 年通车")}。通车后将公布时刻表。</div>`;
  }
  if(asOrigin) html+=`<div class="hintBar">🧭 已设为<b>出发站</b> — 再点击地图上任意站点即可规划路线并计算时间（再点本站取消）</div>`;
  document.getElementById("sBody").innerHTML=html;
  const SRC="区域数据：BOCSAR 犯罪统计 2025.4–2026.3（按行政区）· ABS 2021 人口普查。";
  document.getElementById("sFoot").textContent = (L.open
    ? "首末班为工作日约值，周五/周六末班更晚；实际以 TfNSW / TripView 实时信息为准。"
    : (s.line==="air"?"至市中心时间为经 St Marys 换乘 T1 的估算。":"至市中心时间为官方预估。"))+" "+SRC;
  sheet.classList.add("show");
}
document.getElementById("closeSheet").onclick=()=>sheet.classList.remove("show");
// 点按地图空白/变暗区域：路线显示中 → 清除路线；已选起点 → 取消选中；同时收起卡片
svg.addEventListener("click",()=>{
  if(dragMoved) return;            // 拖动平移后松手不算点按
  if(activeRoute || origin) clearPlan();
  sheet.classList.remove("show");
});

// ════════ 缩放 / 平移 ════════
const VB={x:0,y:0,w:780,h:1000};
let vb={...VB};
const apply=()=>svg.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
function zoomAt(f,cx,cy){
  const nw=Math.min(Math.max(vb.w*f,170),1700), nh=nw*(VB.h/VB.w);
  vb.x=cx-(cx-vb.x)*(nw/vb.w); vb.y=cy-(cy-vb.y)*(nh/vb.h);
  vb.w=nw; vb.h=nh; apply();
}
function pt(cx,cy){ const r=svg.getBoundingClientRect();
  return {x:vb.x+(cx-r.left)/r.width*vb.w, y:vb.y+(cy-r.top)/r.height*vb.h}; }
document.getElementById("zin").onclick=()=>zoomAt(0.72,vb.x+vb.w/2,vb.y+vb.h/2);
document.getElementById("zout").onclick=()=>zoomAt(1.38,vb.x+vb.w/2,vb.y+vb.h/2);
document.getElementById("zreset").onclick=()=>{vb={...VB};apply();};
svg.addEventListener("wheel",e=>{e.preventDefault();
  const p=pt(e.clientX,e.clientY); zoomAt(e.deltaY>0?1.12:0.9,p.x,p.y);},{passive:false});

let drag=null,pinch=null,dragMoved=false;
svg.addEventListener("pointerdown",e=>{dragMoved=false;drag={x:e.clientX,y:e.clientY,vx:vb.x,vy:vb.y};});
svg.addEventListener("pointermove",e=>{
  if(!drag||pinch)return;
  if(Math.hypot(e.clientX-drag.x,e.clientY-drag.y)>6) dragMoved=true;
  const r=svg.getBoundingClientRect();
  vb.x=drag.vx-(e.clientX-drag.x)/r.width*vb.w;
  vb.y=drag.vy-(e.clientY-drag.y)/r.height*vb.h; apply();
});
window.addEventListener("pointerup",()=>drag=null);
svg.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    pinch={d,w:vb.w,cx:(e.touches[0].clientX+e.touches[1].clientX)/2,
           cy:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:true});
svg.addEventListener("touchmove",e=>{
  if(pinch&&e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    const c=pt(pinch.cx,pinch.cy);
    const nw=Math.min(Math.max(pinch.w*(pinch.d/d),170),1700);
    vb.x=c.x-(c.x-vb.x)*(nw/vb.w); vb.y=c.y-(c.y-vb.y)*(nw*(VB.h/VB.w)/vb.h);
    vb.w=nw; vb.h=nw*(VB.h/VB.w); apply();
  }
},{passive:false});
svg.addEventListener("touchend",e=>{if(e.touches.length<2)pinch=null;},{passive:true});

document.getElementById("legendBtn").onclick=()=>
  document.getElementById("legend").classList.toggle("show");
apply();
</script>
